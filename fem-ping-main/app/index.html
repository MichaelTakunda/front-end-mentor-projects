<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/font-awesome/css/all.css">
  <link rel="stylesheet" href="../app/styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Ping coming soon </title>

</head>
<body>
<div class="wrapper">

  <header>
    <nav>
      <a href=""><img class="logo" src="../assets/images/logo.svg" alt="Ping logo"></a>
    </nav>
  </header>

  <main>
    <h1 class="headline"> We are launching<span> soon!</span></h1>
    <p class="description" >Subscribe and get notified</p>

    <section class="input">

      <form action="submit">
        <input class="form" type="email" name="email" id="email" placeholder="Your email address..." aria-autocomplete required aria-required="true">
        <button class="button" type="submit" >Notify Me</button>
      </form>

     
    </section>

    <section>
      <img class="hero_image" src="../assets/images/illustration-dashboard.png" alt="illustration dashboard">
    </section>

  </main>

  <section class="links">
    
    <div class="socials">
      <div class="facebook">
        <a href=""><i class="fa-brands fa-meta fa-1x" aria-hidden="true"></i></a>
      </div>
      <div class="twitter">
        <a href=""><i class="fa-brands fa-x-twitter fa-1x" aria-hidden="true"></i></a>
      </div>
      <div class="instagram">
        <a href=""><i class="fa-brands fa-instagram fa-1x" aria-hidden="true"></i></a>
      </div>
    </div>

  </section>
  
  <footer>
    <p class="licence">&copy; Copyright Ping. All rights reserved.</p>
  </footer>

</div>
  
</body>
</html>
