<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <link rel="stylesheet" href="blogPreviewCard.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

</head>
<body>

<div class="container wrapper">

  <div class="images">
    <img src="assets/images/illustration-article.svg" alt="illustration-article" class="illustration-article">
  </div>

  <div class="information">

    <h3 class="btn">Learning</h3>

    <p class="date">Published 21 Dec 2023</p>

    <h1 class="main-heading">HTML & CSS foundations</h1>

    <p class="information-text">These languages are the backbone of every website, defining structure, content, and presentation.</p>

  </div>

  <div class="profile">
    <img src="assets/images/image-avatar.webp" alt="An avatar assigned to the profile" class="profile-avatar">

    <h5>Greg Hooper</h5>

  </div>

</div>

  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Michael Takunda Moyo</a>.
  </div>
</body>
</html>
