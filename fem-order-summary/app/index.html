<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Order summary card</title>

</head>
<body>

  <main>

    <div class="wrapper">

      <img class="hero-illustration" src="../assets/images/illustration-hero.svg" alt="product-summary-svg">

      <div class="sub-wrapper">
        <h1>Order Summary</h1>

      <p>
        You can now listen to millions of songs, audiobooks, and podcasts on any 
        device anywhere you like!
      </p>

      <div class="pricing-plans">

        <div class="icon">
          <img class="music-icon" src="../assets/images/icon-music.svg" alt="">

          <div class="current-plan">
            <h2>Annual Plan</h2>
            <p>$59.99/year</p>
          </div>

        </div>
        
        <h3>
          <a href="">Change</a>
        </h3>
      </div>

      </div>

      <button id="proceed">Proceed to Payment</button>

      <button id="cancel">Cancel Order</button>
      

    </div>

  </main>
  
</body>
</html>
